services:
  nginx-rtmp:
    image: alfg/nginx-rtmp:latest
    container_name: vidyaro-live
    restart: unless-stopped
    ports:
      - "1935:1935" # RTMP — OBS connects here
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      # Use bind-mount to match coolify-compose.yml so local dev == production
      - /opt/vidyaro/recordings:/recordings
    environment:
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - VIDYARO_APP_URL=${VIDYARO_APP_URL}
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vidyaro-live.rule=Host(`live.vidyaro.com`)"
      - "traefik.http.routers.vidyaro-live.entrypoints=https"
      - "traefik.http.routers.vidyaro-live.tls=true"
      - "traefik.http.routers.vidyaro-live.tls.certresolver=letsencrypt"
      - "traefik.http.services.vidyaro-live.loadbalancer.server.port=8080"

  recorder:
    build: ./recorder
    container_name: vidyaro-recorder
    restart: unless-stopped
    environment:
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID}
      - APPWRITE_LECTURES_COL_ID=${APPWRITE_LECTURES_COL_ID}
      - VIDYARO_APP_URL=${VIDYARO_APP_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    volumes:
      # Same bind-mount as rtmp container — must be identical path
      - /opt/vidyaro/recordings:/recordings
    networks:
      - coolify
    depends_on:
      - nginx-rtmp

networks:
  coolify:
    external: true
