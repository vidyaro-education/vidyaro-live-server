##############################################################################
#  Vidyaro Live Server — docker-compose.yaml
#
#  Deployment targets:
#    • Coolify  (point it at this repo, Docker Compose type)
#    • Any VPS  (docker compose up -d --build)
#
#  Required env vars — set in Coolify UI or a .env file:
#    See .env.example for the full list.
##############################################################################
version: "3.9"

services:
  nginx-rtmp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vidyaro-live
    restart: unless-stopped

    # ── Networks ─────────────────────────────────────────────────────────────
    # FIX: Must join the "coolify" external network so the Next.js container
    # hostname resolves from inside this container at nginx startup.
    # Without this, every redeploy loses the manual "docker network connect"
    # and nginx fails with "host not found" on the on_publish URL.
    networks:
      - default
      - coolify

    # ── Ports ───────────────────────────────────────────────────────────────
    ports:
      # RTMP — raw TCP, cannot be proxied by Traefik/Caddy
      # Must be opened in your VPS firewall AND Coolify server settings
      - "1935:1935"

    expose:
      # Traefik/Caddy picks this up and routes HTTPS → HTTP 8080
      - "8080"

    # ── Environment variables ──────────────────────────────────────────────
    # All set in Coolify UI or .env — NOT hardcoded here (this file is in git)
    environment:
      - STREAM_AUTH_URL=${STREAM_AUTH_URL}
      - VIDYARO_APP_DOMAIN=${VIDYARO_APP_DOMAIN}
      - VIDYARO_APP_URL=${VIDYARO_APP_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - VIDYARO_APP_INTERNAL_HOST=${VIDYARO_APP_INTERNAL_HOST}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID}
      - APPWRITE_STREAM_KEYS_COLLECTION_ID=${APPWRITE_STREAM_KEYS_COLLECTION_ID}

    # ── Volumes ─────────────────────────────────────────────────────────────
    volumes:
      # Named volume — persists raw FLV recordings across redeploys
      - recordings:/recordings

      # RAM-backed tmpfs — HLS segments (fast I/O, auto-cleaned on stop)
      - type: tmpfs
        target: /tmp/live
        tmpfs:
          size: 2147483648 # 2 GB

      # RAM-backed tmpfs — AES-128 encryption keys
      - type: tmpfs
        target: /tmp/keys
        tmpfs:
          size: 10485760 # 10 MB

      # RAM-backed tmpfs — MP4 work area during ffmpeg + R2 upload
      - type: tmpfs
        target: /tmp/recordings
        tmpfs:
          size: 4294967296 # 4 GB

    # ── Health check ────────────────────────────────────────────────────────
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    # ── Logging ─────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  default: # Compose-managed network for internal service communication
  coolify:
    external: true
      # References the existing network Coolify created
      # All Coolify containers are on this network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  recordings:
    driver: local
