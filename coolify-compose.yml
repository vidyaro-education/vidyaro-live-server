services:
  rtmp:
    image: 'alfg/nginx-rtmp:latest'
    container_name: vidyaro-live
    restart: unless-stopped

    # Run envsubst first to inject ALL template vars, then start nginx.
    # The template is bind-mounted read-only; rendered copy goes to nginx's
    # expected config path.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        envsubst '${INTERNAL_SECRET} ${VIDYARO_APP_URL}' \
          < /etc/nginx/nginx.conf.template \
          > /etc/nginx/nginx.conf \
        && nginx -c /etc/nginx/nginx.conf -g 'daemon off;'

    ports:
      - '1935:1935'    # RTMP — OBS streams directly (no Traefik proxy)

    expose:
      - '8080'         # HLS HTTP — routed via Traefik to students

    volumes:
      # nginx.conf.template is in the repo root — Coolify clones the repo,
      # so we use a repo-relative path (NOT /root/ which is a host path).
      - './nginx.conf.template:/etc/nginx/nginx.conf.template:ro'
      - '/opt/vidyaro/recordings:/recordings'

    environment:
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      # VIDYARO_APP_URL is needed by nginx.conf.template for hls_key_url
      - VIDYARO_APP_URL=${VIDYARO_APP_URL}

    labels:
      - traefik.enable=true
      - traefik.http.routers.vidyaro-live.rule=Host(`live.vidyaro.com`)
      - traefik.http.routers.vidyaro-live.entrypoints=https
      - traefik.http.routers.vidyaro-live.tls=true
      - traefik.http.routers.vidyaro-live.tls.certresolver=letsencrypt
      - traefik.http.services.vidyaro-live.loadbalancer.server.port=8080
      - traefik.docker.network=coolify

    networks:
      - coolify

  recorder:
    build: ./recorder
    container_name: vidyaro-recorder
    restart: unless-stopped
    # All env vars come from Coolify UI — no env_file needed (it doesn't exist in the repo)
    environment:
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID}
      - APPWRITE_LECTURES_COL_ID=${APPWRITE_LECTURES_COL_ID}
      - VIDYARO_APP_URL=${VIDYARO_APP_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    volumes:
      - '/opt/vidyaro/recordings:/recordings'
    networks:
      - coolify
    depends_on:
      - rtmp

networks:
  coolify:
    external: true
