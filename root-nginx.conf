########################################################################
# /root/nginx.conf.template  ← SSH this file onto your live server as:
#   /root/nginx.conf.template
#
# Coolify's entrypoint runs:
#   envsubst '${INTERNAL_SECRET}' < nginx.conf.template > nginx.conf
#
# Anti-piracy features:
#   1. Rate limiting (30 req/s/IP) — blocks yt-dlp/ffmpeg scrapers
#   2. valid_referers — prevents embedding on other domains
#   3. HLS AES-128 encryption — downloaded .ts files are unplayable
#   4. /hls-key/ internal endpoint — only Next.js can fetch keys
#        (protected by X-Internal-Secret header matching ${INTERNAL_SECRET})
########################################################################

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

########################################################################
# RTMP — Ingest from OBS / teaching software
########################################################################
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_message 1M;
        timeout 30s;

        application stream {
            live on;
            drop_idle_publisher 10s;

            # ── Stream Authentication ──────────────────────────────────
            on_publish https://vidyaro.com/api/stream-auth;

            # ── HLS Output ─────────────────────────────────────────────
            hls on;
            hls_path /tmp/live;          # MUST match HTTP location /live {root /tmp;}
            hls_fragment 2s;
            hls_playlist_length 20s;
            hls_nested on;               # /tmp/live/{lectureId}/index.m3u8
            hls_continuous on;
            hls_cleanup on;
            hls_type live;

            # ── AES-128 HLS Encryption (anti-piracy #3) ───────────────
            # Every 10 fragments → new key. Keys served by Next.js with auth.
            # Downloaded .ts segments are unplayable without the key.
            hls_keys on;
            hls_key_path /recordings/keys;
            hls_key_url https://vidyaro.com/api/hls-key/;
            hls_fragments_per_key 10;

            # ── Recording ──────────────────────────────────────────────
            record all;
            record_path /recordings;
            record_suffix _%Y%m%d_%H%M%S.flv;
            record_unique on;
            record_max_size 4096M;

            exec_record_done sh -c 'touch "/recordings/$name.done" || true';
        }
    }
}

########################################################################
# HTTP — HLS delivery for students
########################################################################
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types application/vnd.apple.mpegurl application/json text/plain;

    # ── Anti-piracy #1: Rate limiting ──────────────────────────────────
    # 30 req/s per IP, burst 100 — student: ~0.5 r/s, scraper: 100+ r/s
    limit_req_zone $binary_remote_addr zone=hls:10m rate=30r/s;

    # ── Anti-piracy #4: HLS key endpoint protection ────────────────────
    # Requests must carry X-Internal-Secret matching our INTERNAL_SECRET.
    # envsubst fills in ${INTERNAL_SECRET} from the environment variable.
    map $http_x_internal_secret $hls_key_allowed {
        "${INTERNAL_SECRET}"  1;
        default               0;
    }

    server {
        listen 8080;
        server_name _;

        # ── HLS segments ───────────────────────────────────────────────
        location /live {
            root /tmp;

            # Anti-piracy #2: CORS domain lock
            valid_referers blocked vidyaro.com *.vidyaro.com;
            if ($invalid_referer) {
                return 403 "Forbidden";
            }

            # Anti-piracy #1: apply rate limit
            limit_req zone=hls burst=100 nodelay;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                    ts;
            }

            # m3u8 — never cache (always fresh playlist)
            location ~* \.m3u8$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Access-Control-Allow-Origin 'https://vidyaro.com' always;
            }

            # ts — short cache (segments are immutable once written)
            location ~* \.ts$ {
                expires 5s;
                add_header Cache-Control "public, max-age=5";
                add_header Access-Control-Allow-Origin 'https://vidyaro.com' always;
            }

            add_header Access-Control-Allow-Origin 'https://vidyaro.com' always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        }

        # ── HLS key proxy (internal — not directly accessible) ─────────
        # Keys at /recordings/keys/{name}.key, served only to Next.js
        # which sends X-Internal-Secret matching INTERNAL_SECRET.
        location /hls-key/ {
            if ($hls_key_allowed = 0) {
                return 403 "Forbidden";
            }
            alias /recordings/keys/;
            access_log off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Content-Type "application/octet-stream";
        }

        # ── Health check ───────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── RTMP stats (internal debugging only) ───────────────────────
        location /stat {
            rtmp_stat all;
            allow 127.0.0.1;
            deny  all;
        }

        location / {
            return 404;
        }
    }
}
