########################################################################
# root-nginx.conf — Reference copy of nginx.conf.template
#
# This file is identical to nginx.conf.template but with all ${VARS}
# already substituted with their real production values for reference.
#
# DO NOT use this file as the actual nginx config in Coolify —
# Coolify uses nginx.conf.template and runs envsubst at container start.
#
# This file is useful for:
#   - Manual SSH debugging on the live server
#   - Reference for what the final rendered config looks like
#   - Verifying the template substitution is correct
########################################################################

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

########################################################################
# RTMP — Ingest from OBS / teaching software
########################################################################
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_message 1M;
        timeout 30s;

        application stream {
            live on;
            drop_idle_publisher 10s;

            # ── Stream Authentication ──────────────────────────────────
            on_publish https://vidyaro.com/api/stream-auth;

            # ── HLS Output ─────────────────────────────────────────────
            hls on;
            hls_path /tmp/live;          # HTTP location /live { root /tmp; }
            hls_fragment 2s;
            hls_playlist_length 20s;
            hls_nested on;               # /tmp/live/{roomId}/index.m3u8
            hls_continuous on;
            hls_cleanup on;
            hls_type live;

            # ── AES-128 HLS Encryption (anti-piracy) ──────────────────
            hls_keys on;
            hls_key_path /recordings/keys;
            hls_key_url https://vidyaro.com/api/hls-key/;
            hls_fragments_per_key 10;

            # ── Recording ──────────────────────────────────────────────
            record all;
            record_path /recordings;
            record_suffix _%Y%m%d_%H%M%S.flv;
            record_unique on;
            record_max_size 4096M;

            exec_record_done sh -c 'touch "/recordings/$name.done" || true';
        }
    }
}

########################################################################
# HTTP — HLS delivery for students
########################################################################
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types application/vnd.apple.mpegurl application/json text/plain;

    # ── Rate limiting ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=hls:10m rate=30r/s;

    # ── HLS key endpoint protection ────────────────────────────────────
    map $http_x_internal_secret $hls_key_allowed {
        "REPLACE_WITH_YOUR_INTERNAL_SECRET"  1;
        default                              0;
    }

    server {
        listen 8080;
        server_name _;

        # ── HLS segments ───────────────────────────────────────────────
        # RTMP writes to /tmp/live/{roomId}/ so serve from root /tmp
        location /live {
            root /tmp;

            valid_referers blocked vidyaro.com *.vidyaro.com;
            if ($invalid_referer) {
                return 403 "Forbidden";
            }

            limit_req zone=hls burst=100 nodelay;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                    ts;
            }

            location ~* \.m3u8$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Access-Control-Allow-Origin "https://vidyaro.com" always;
            }

            location ~* \.ts$ {
                expires 5s;
                add_header Cache-Control "public, max-age=5";
                add_header Access-Control-Allow-Origin "https://vidyaro.com" always;
            }

            add_header Access-Control-Allow-Origin "https://vidyaro.com" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        }

        # ── HLS key proxy (internal only) ─────────────────────────────
        location /hls-key/ {
            if ($hls_key_allowed = 0) {
                return 403 "Forbidden";
            }
            alias /recordings/keys/;
            access_log off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Content-Type "application/octet-stream";
        }

        # ── Health check ──────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── RTMP stats (internal debugging only) ──────────────────────
        location /stat {
            rtmp_stat all;
            allow 127.0.0.1;
            deny  all;
        }

        location / {
            return 404;
        }
    }
}
